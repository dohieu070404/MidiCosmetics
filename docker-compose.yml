services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: midi_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Backend reads DATABASE_URL/DIRECT_URL from backend/.env and connects directly to Supabase.
      PORT: 8080
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "src/scripts/healthcheck.js"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    networks:
      - midi_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Midi Cosmetics}
        # In Docker, nginx proxies /api/* to the backend service.
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:8081}
        VITE_ENABLE_API_MOCKING: ${VITE_ENABLE_API_MOCKING:-false}
        VITE_ADMIN_LOGIN_PATH: ${VITE_ADMIN_LOGIN_PATH:-/quan-tri-midi-secure-2026}
    container_name: midi_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - midi_network

volumes:
  backend_uploads:

networks:
  midi_network:
    driver: bridge
